name: Bug report
description: Report a reproducible Agentic TestOps issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the command, minimal project layout, and relevant output.
      value: |
        ```bash
        agentic-testops audit .
        ```
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "main, tag, or commit SHA"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "python --version"
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
