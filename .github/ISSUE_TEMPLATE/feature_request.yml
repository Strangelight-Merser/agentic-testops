name: Feature request
description: Suggest a capability or integration.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Agentic TestOps do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - GitHub Action
        - pytest parsing
        - diagnosis rules
        - dry-run fix suggestions
        - documentation
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
