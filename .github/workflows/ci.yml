name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Mypy type check
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -q

      - name: Smoke test failing example report
        run: |
          set +e
          agentic-testops audit examples/buggy_calculator \
            --rerun-failures \
            --suggest-fixes \
            -o reports/buggy-calculator-report.md \
            --json-output reports/buggy-calculator-report.json \
            --fix-output reports/buggy-calculator-fixes.patch
          rc=$?
          set -e
          test "$rc" -eq 1
          test -f reports/buggy-calculator-report.md
          test -f reports/buggy-calculator-report.json
          test -f reports/buggy-calculator-fixes.patch

      - name: Smoke test service health diagnostics
        run: |
          set +e
          agentic-testops audit examples/service_health \
            --rerun-failures \
            --suggest-fixes \
            -o reports/service-health-report.md \
            --json-output reports/service-health-report.json \
            --fix-output reports/service-health-fixes.patch
          rc=$?
          set -e
          test "$rc" -eq 1
          test -f reports/service-health-report.md
          test -f reports/service-health-report.json
          test -f reports/service-health-fixes.patch
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("reports/service-health-report.json").read_text(encoding="utf-8"))
          categories = {diagnosis["category"] for diagnosis in report["diagnoses"]}
          assert {"filesystem-boundary", "object-interface", "symbol-resolution"} <= categories
          PY

      - name: Smoke test flaky failure detection
        run: |
          rm -f examples/flaky_pipeline/.cache_warm
          set +e
          agentic-testops audit examples/flaky_pipeline \
            --detect-flaky 2 \
            -o reports/flaky-pipeline-report.md \
            --json-output reports/flaky-pipeline-report.json
          rc=$?
          set -e
          rm -f examples/flaky_pipeline/.cache_warm
          test "$rc" -eq 1
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("reports/flaky-pipeline-report.json").read_text(encoding="utf-8"))
          verdicts = {item["nodeid"]: item["verdict"] for item in report["flake_results"]}
          assert verdicts["test_pipeline.py::test_fetch_rates_includes_eur"] == "flaky"
          assert verdicts["test_pipeline.py::test_convert_applies_rate_exactly"] == "consistent"
          PY

      - name: Smoke test composite action
        id: action-smoke
        uses: ./
        with:
          project: examples/task_tracker
          output: reports/action-task-tracker-report.md
          json-output: reports/action-task-tracker-report.json
          fix-output: reports/action-task-tracker-fixes.patch
          rerun-failures: "true"
          suggest-fixes: "true"
          job-summary: "true"
          fail-on-test-failure: "false"

      - name: Verify composite action outputs
        run: |
          test "${{ steps.action-smoke.outputs.exit-code }}" -eq 1
          test "${{ steps.action-smoke.outputs.summary-written }}" = true
          test -f reports/action-task-tracker-report.md
          test -f reports/action-task-tracker-report.json
          test -f reports/action-task-tracker-fixes.patch

      - name: Upload sample reports
        uses: actions/upload-artifact@v7
        with:
          name: agentic-testops-reports
          path: reports/
