name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -q

      - name: Smoke test failing example report
        run: |
          set +e
          agentic-testops audit examples/buggy_calculator \
            --rerun-failures \
            --suggest-fixes \
            -o reports/buggy-calculator-report.md \
            --json-output reports/buggy-calculator-report.json \
            --fix-output reports/buggy-calculator-fixes.patch
          rc=$?
          set -e
          test "$rc" -eq 1
          test -f reports/buggy-calculator-report.md
          test -f reports/buggy-calculator-report.json
          test -f reports/buggy-calculator-fixes.patch

      - name: Smoke test composite action
        id: action-smoke
        uses: ./
        with:
          project: examples/task_tracker
          output: reports/action-task-tracker-report.md
          json-output: reports/action-task-tracker-report.json
          fix-output: reports/action-task-tracker-fixes.patch
          rerun-failures: "true"
          suggest-fixes: "true"
          fail-on-test-failure: "false"

      - name: Verify composite action outputs
        run: |
          test "${{ steps.action-smoke.outputs.exit-code }}" -eq 1
          test -f reports/action-task-tracker-report.md
          test -f reports/action-task-tracker-report.json
          test -f reports/action-task-tracker-fixes.patch

      - name: Upload sample reports
        uses: actions/upload-artifact@v4
        with:
          name: agentic-testops-reports
          path: reports/
