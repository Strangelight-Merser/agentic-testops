name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -q

      - name: Smoke test failing example report
        run: |
          set +e
          agentic-testops audit examples/buggy_calculator \
            --rerun-failures \
            -o reports/buggy-calculator-report.md \
            --json-output reports/buggy-calculator-report.json
          rc=$?
          set -e
          test "$rc" -eq 1
          test -f reports/buggy-calculator-report.md
          test -f reports/buggy-calculator-report.json

      - name: Upload sample reports
        uses: actions/upload-artifact@v4
        with:
          name: agentic-testops-reports
          path: reports/
